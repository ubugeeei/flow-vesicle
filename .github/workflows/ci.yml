name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: flow + test + build + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Flow check
        run: yarn flow

      - name: Tests
        run: yarn test

      - name: Build
        run: yarn build

      - name: Smoke
        run: yarn smoke
